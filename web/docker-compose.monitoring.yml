name: edgepos-monitoring

# Observability stack — joins supabase_network_edgePOS so it can scrape the
# app/db by service name. All UIs bound to 127.0.0.1 only (reach via SSH tunnel:
#   ssh -L 3003:localhost:3003 -L 9090:localhost:9090 -L 3004:localhost:3004 ...
# Bring up:  docker compose -f docker-compose.monitoring.yml up -d

services:
  prometheus:
    container_name: edgepos-prometheus
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    user: root
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    container_name: edgepos-grafana
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: nexusadmin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://grafana.16-112-248-61.nip.io
      GF_SERVER_DOMAIN: grafana.16-112-248-61.nip.io
    ports:
      - "127.0.0.1:3003:3000"

  node-exporter:
    container_name: edgepos-node-exporter
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    pid: host
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    container_name: edgepos-cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  postgres-exporter:
    container_name: edgepos-postgres-exporter
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres?sslmode=disable"

  uptime-kuma:
    container_name: edgepos-uptime-kuma
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - kuma-data:/app/data
    ports:
      - "127.0.0.1:3004:3001"

networks:
  default:
    name: supabase_network_edgePOS
    external: true

volumes:
  prometheus-data:
  grafana-data:
  kuma-data:
