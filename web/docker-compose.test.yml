services:
  edgepos-web:
    env_file: .env.docker
    networks:
      - default
      - supabase

  whatsapp-gateway:
    env_file: ./services/whatsapp-gateway/.env.test

  e2e-runner:
    build:
      context: .
      dockerfile: e2e/Dockerfile
    depends_on:
      - edgepos-web
      - whatsapp-gateway
      - logistics-bridge
    environment:
      - BASE_URL=http://edgepos-web:3000
      - WHATSAPP_GATEWAY_URL=http://whatsapp-gateway:3001
    volumes:
      - ./e2e/test-results:/app/e2e/test-results
      - ./e2e/storage:/app/e2e/storage
    networks:
      - default
      - supabase

networks:
  supabase:
    name: supabase_network_edgePOS
    external: true
